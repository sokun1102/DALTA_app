version: '3.8'

services:
  # =============================================
  # MySQL Database
  # =============================================
  mysql:
    image: mysql:8.0
    container_name: dalta-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-dalta}
      MYSQL_USER: ${DB_USER:-dalta_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dalta_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Auth + Users Service (Port 3000)
  # =============================================
  auth-users:
    build:
      context: .
      dockerfile: Dockerfile.main
    container_name: dalta-auth-users
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-dalta_user}
      DB_PASSWORD: ${DB_PASSWORD:-dalta_password}
      DB_NAME: ${DB_NAME:-dalta}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================
  # Products Service (Port 3001)
  # =============================================
  products:
    build:
      context: ./src-products
      dockerfile: Dockerfile
    container_name: dalta-products
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-dalta_user}
      DB_PASSWORD: ${DB_PASSWORD:-dalta_password}
      DB_NAME: ${DB_NAME:-dalta}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================
  # Categories Service (Port 3002)
  # =============================================
  categories:
    build:
      context: ./src-categories
      dockerfile: Dockerfile
    container_name: dalta-categories
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-dalta_user}
      DB_PASSWORD: ${DB_PASSWORD:-dalta_password}
      DB_NAME: ${DB_NAME:-dalta}
      PRODUCTS_SERVICE_URL: http://products:3001
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
      products:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================
  # Orders + Payments Service (Port 3003)
  # =============================================
  orders-payments:
    build:
      context: .
      dockerfile: Dockerfile.orders
    container_name: dalta-orders-payments
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-dalta_user}
      DB_PASSWORD: ${DB_PASSWORD:-dalta_password}
      DB_NAME: ${DB_NAME:-dalta}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PORT: 3003
    ports:
      - "3003:3003"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
